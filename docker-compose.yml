version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: roko_admin
      POSTGRES_PASSWORD: roko_password
      POSTGRES_DB: roko_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  cpp-service:
    build:
      context: .
      dockerfile: cpp-services/Dockerfile
    ports:
      - "50051:50051"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=postgresql://roko_admin:roko_password@postgres:5432/roko_db?schema=public
      - JWT_SECRET=roko_super_secret_key_2026
      - PORT=4000
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - cpp-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
